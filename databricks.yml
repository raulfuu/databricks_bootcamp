bundle:
  name: bootcamp_pipeline_project

resources:
  # --- ADD THE NEW DLT PIPELINE RESOURCE ---
  pipelines:
    bootcamp_dlt_pipeline:
      name: "Data Declarative DLT Pipeline - [${bundle.target}]"
      catalog: "${bundle.target}_bootcamp"
      schema: "data_ingestion" # <-- Changed from target to schema to fix the red warning
      serverless: true
      continuous: false        
      development: true
      libraries:
        - notebook:
            path: "src/dlt_pipeline.py"
      configuration:
        pipeline.env_catalog: "${bundle.target}_bootcamp"
        pipeline.config_path: "/Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/files/metadata/dataflows.json"
  
  jobs:
  
    bootcamp_validation_job:
      name: "Data Validation Pipeline - [${bundle.target}]"
      email_notifications:
        on_failure:
          - "raul.fuente@sdggroup.com"
      tasks:
        - task_key: run_pipeline_engine
          notebook_task:
            notebook_path: "src/main.py"
            base_parameters:
              env_catalog: "${bundle.target}_bootcamp"

        - task_key: enforce_unity_catalog_security
          depends_on:
            - task_key: run_pipeline_engine
          notebook_task:
            notebook_path: "src/apply_governance.sql"
            base_parameters:
              env_catalog: "${bundle.target}_bootcamp"


    bootcamp_dlt_orchestration_job:
      name: "DLT Orchestration & Governance - [${bundle.target}]"
      email_notifications:
        on_failure:
          - "raul.fuente@sdggroup.com"
      tasks:
        - task_key: trigger_dlt_engine
          pipeline_task:
            pipeline_id: ${resources.pipelines.bootcamp_dlt_pipeline.id}

        - task_key: enforce_dlt_security
          depends_on:
            - task_key: trigger_dlt_engine
          notebook_task:
            notebook_path: "src/apply_governance_dlt.sql"
            base_parameters:
              env_catalog: "${bundle.target}_bootcamp"

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-0a9bb286-4b8b.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev

  prod:
    workspace:
      host: https://dbc-0a9bb286-4b8b.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/prod